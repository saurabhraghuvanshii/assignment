version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: proactive-assistant-db
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant123
      POSTGRES_DB: proactive_assistant
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U assistant -d proactive_assistant']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://assistant:assistant123@postgres:5432/proactive_assistant?schema=public"
      NODE_ENV: development
    command: >
      bash -c "
        npm install &&
        npx prisma generate &&
        npx prisma migrate deploy &&
        npm run dev -- --hostname 0.0.0.0
      "

volumes:
  pgdata:
  node_modules:
